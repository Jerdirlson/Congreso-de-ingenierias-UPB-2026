server {
    listen 80;
    server_name congreso2026.bucaramanga.upb.edu.co 207.248.81.83;

    charset utf-8;

    # Cabeceras de seguridad
    add_header X-Frame-Options      "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection     "1; mode=block";
    add_header Referrer-Policy      "strict-origin-when-cross-origin";

    # ── Frontend (Vue SPA) ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Todas las rutas que no sean archivos físicos → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Laravel + Sanctum → PHP-FPM ──────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        fastcgi_pass   backend:9000;

        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        fastcgi_param  DOCUMENT_ROOT    /var/www/html/public;
        fastcgi_param  REQUEST_URI      $request_uri;
        fastcgi_param  QUERY_STRING     $query_string;
        fastcgi_param  REQUEST_METHOD   $request_method;
        fastcgi_param  CONTENT_TYPE     $content_type;
        fastcgi_param  CONTENT_LENGTH   $content_length;
        fastcgi_param  SERVER_NAME      $server_name;
        fastcgi_param  HTTPS            off;

        include        fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    # ── Archivos de media (storage:link) ──────────────────────────────────────
    location /storage/ {
        alias   /var/www/html/storage/app/public/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    error_log  /var/log/nginx/cgr-error.log;
    access_log /var/log/nginx/cgr-access.log;
}
