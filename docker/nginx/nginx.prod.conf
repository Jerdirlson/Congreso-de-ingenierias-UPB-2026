# Ocultar versión de Nginx en headers y páginas de error
server_tokens off;

# Rate limiting: 30 req/s por IP para la API (permite bursts cortos)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name congreso2026.bucaramanga.upb.edu.co 207.248.81.83;

    charset utf-8;

    # Cabeceras de seguridad
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ── Frontend (Vue SPA) ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Todas las rutas que no sean archivos físicos → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Subida de archivos grandes: sin límite de body en uploads ─────────────
    client_max_body_size 2100M;

    # Eficiencia para transferencias de archivos grandes
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # ── API Laravel + Sanctum → PHP-FPM ──────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        limit_req zone=api burst=60 nodelay;

        fastcgi_pass   backend:9000;

        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        fastcgi_param  DOCUMENT_ROOT    /var/www/html/public;
        fastcgi_param  REQUEST_URI      $request_uri;
        fastcgi_param  QUERY_STRING     $query_string;
        fastcgi_param  REQUEST_METHOD   $request_method;
        fastcgi_param  CONTENT_TYPE     $content_type;
        fastcgi_param  CONTENT_LENGTH   $content_length;
        fastcgi_param  SERVER_NAME      $server_name;
        fastcgi_param  HTTPS            off;

        include        fastcgi_params;
        # Timeout largo para subidas de video (2 GB a 10 MB/s ≈ 200 s)
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffer_size  64k;
        fastcgi_buffers      4 64k;
    }

    # ── Archivos de media (storage:link) ──────────────────────────────────────
    # Nginx sirve documentos y videos directamente sin pasar por PHP
    location /storage/ {
        alias   /var/www/html/storage/app/public/;
        try_files $uri =404;

        # Range requests para reproducción de video (seeking sin re-descarga)
        add_header Accept-Ranges bytes;

        # Videos: no gzip (ya están comprimidos), caché corta
        location ~* \.(mp4|webm|mov|avi|mkv|m4v)$ {
            add_header Accept-Ranges   bytes;
            add_header Cache-Control   "public, max-age=3600";
            # Pseudo-streaming MP4: permite saltar a cualquier punto sin buffer previo
            mp4;
            mp4_buffer_size     1m;
            mp4_max_buffer_size 5m;
        }

        # Documentos: caché larga (el nombre incluye hash en nuevas versiones)
        location ~* \.(pdf|docx|pptx|xlsx|zip|doc|ppt)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Imágenes y resto: caché larga
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    error_log  /var/log/nginx/cgr-error.log;
    access_log /var/log/nginx/cgr-access.log;
}
