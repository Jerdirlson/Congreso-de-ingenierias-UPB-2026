# Ocultar versión de Nginx en headers y páginas de error
server_tokens off;

# Rate limiting: 30 req/s por IP para la API (permite bursts cortos)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name congreso2026.bucaramanga.upb.edu.co 207.248.81.83;

    charset utf-8;

    # Tamaño máximo de request (subida de archivos)
    client_max_body_size 110M;

    # Cabeceras de seguridad
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # ── Frontend (Vue SPA) ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Todas las rutas que no sean archivos físicos → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Laravel + Sanctum → PHP-FPM ──────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        limit_req zone=api burst=60 nodelay;

        fastcgi_pass   backend:9000;

        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        fastcgi_param  DOCUMENT_ROOT    /var/www/html/public;
        fastcgi_param  REQUEST_URI      $request_uri;
        fastcgi_param  QUERY_STRING     $query_string;
        fastcgi_param  REQUEST_METHOD   $request_method;
        fastcgi_param  CONTENT_TYPE     $content_type;
        fastcgi_param  CONTENT_LENGTH   $content_length;
        fastcgi_param  SERVER_NAME      $server_name;
        fastcgi_param  HTTPS            off;

        include        fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size  64k;
        fastcgi_buffers      4 64k;
    }

    # ── Archivos de media (storage:link) ──────────────────────────────────────
    location /storage/ {
        alias   /var/www/html/storage/app/public/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    error_log  /var/log/nginx/cgr-error.log;
    access_log /var/log/nginx/cgr-access.log;
}
