; PHP settings for production — documentos + videos grandes
upload_max_filesize = 2048M
post_max_size       = 2050M
max_execution_time  = 600
max_input_time      = 600
memory_limit        = 512M
display_errors      = Off
log_errors          = On
error_reporting     = E_ALL & ~E_DEPRECATED & ~E_STRICT
date.timezone       = America/Bogota
