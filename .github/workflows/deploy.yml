name: CI/CD — Congreso Ingenierías 2026

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests del backend (Laravel + SQLite en memoria) ──────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite, sqlite3, zip, gd, bcmath
          coverage: none

      - name: Cache de dependencias Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar entorno de tests
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar tests
        working-directory: backend
        run: php artisan test --stop-on-failure

  # ── 2. Deploy al VPS (solo push a main, solo si los tests pasan) ────────────
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Actualizar código
        run: git -C ~/congreso pull origin main

      - name: Reconstruir y reiniciar servicios
        run: docker compose -f ~/congreso/docker-compose.prod.yml up --build -d

      - name: Verificar despliegue
        run: |
          sleep 10
          docker compose -f ~/congreso/docker-compose.prod.yml ps
