services:

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cgr-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - cgr-storage:/var/www/html/storage:ro   # archivos subidos (read-only)
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cgr-network

  # ── PHP-FPM (Laravel backend) ─────────────────────────────────────────────
  backend:
    build:
      context: .                          # Raíz del proyecto (para COPY backend/ y docker/)
      dockerfile: docker/php/Dockerfile
    container_name: cgr-backend
    volumes:
      - ./backend:/var/www/html           # Código fuente (hot-reload en dev)
      - cgr-vendor:/var/www/html/vendor   # Vendor pre-instalado en el build, persiste entre reinicios
      - cgr-storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: congreso_db
      DB_USERNAME: congreso
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cgr-network


  # ── Queue worker (procesa jobs como videos) ───────────────────────────────
  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cgr-queue-worker
    command: ['php', 'artisan', 'queue:work', 'redis', '--sleep=3', '--tries=2', '--timeout=300']
    volumes:
      - ./backend:/var/www/html
      - cgr-vendor:/var/www/html/vendor
      - cgr-storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: congreso_db
      DB_USERNAME: congreso
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cgr-network
  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cgr-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: congreso_db
      MYSQL_USER: congreso
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - cgr-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cgr-network

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cgr-redis
    ports:
      - "6379:6379"
    volumes:
      - cgr-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cgr-network

  # ── Mailpit (captura correos en dev, UI en :8025) ─────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: cgr-mailpit
    ports:
      - "8025:8025"   # Web UI: http://localhost:8025
      - "1025:1025"   # SMTP (para que Laravel envíe aquí)
    restart: unless-stopped
    networks:
      - cgr-network

  # ── phpMyAdmin (DB manager, dev only) ─────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: cgr-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: congreso
      PMA_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cgr-network

  # ── Vue 3 frontend (Vite dev server) ─────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: cgr-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # En Docker: Vite proxea /api → nginx → backend
      VITE_API_PROXY_TARGET: http://nginx:80
    restart: unless-stopped
    networks:
      - cgr-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  cgr-mysql:
  cgr-redis:
  cgr-storage:
  cgr-vendor:      # Vendor pre-instalado durante docker build

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  cgr-network:
    driver: bridge
