services:

  # ── Nginx: sirve el frontend compilado y hace proxy al backend ────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: cgr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Bind mount al host (read-only) — Nginx sirve archivos directamente
      - ./data/storage/app/public:/var/www/html/storage/app/public:ro
      # SSL (se agrega cuando el CTIC entregue los certificados)
      # - /etc/ssl/congreso:/etc/ssl/congreso:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cgr-network

  # ── PHP-FPM (Laravel backend) ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cgr-backend
    volumes:
      - ./backend:/var/www/html
      - cgr-vendor:/var/www/html/vendor
      # Bind mount al host → archivos accesibles y fáciles de respaldar
      - ./data/storage:/var/www/html/storage
      # Sobreescribe php.ini del build con límites grandes para prod
      - ./docker/php/php.prod.ini:/usr/local/etc/php/conf.d/app.ini:ro
    environment:
      APP_ENV:    production
      APP_DEBUG:  "false"
      APP_URL:    ${APP_URL:-https://congreso2026.bucaramanga.upb.edu.co}
      APP_KEY:    ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST:    mysql
      DB_PORT:    "3306"
      DB_DATABASE: ${DB_DATABASE:-congreso_db}
      DB_USERNAME: ${DB_USERNAME:-congreso}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      CACHE_DRIVER:      redis
      SESSION_DRIVER:    redis
      QUEUE_CONNECTION:  redis
      FILESYSTEM_DISK:   public
      LOG_CHANNEL:       stderr
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-congreso2026.bucaramanga.upb.edu.co}
      # Habilita /api/dev/* para pruebas. Quitar cuando no se necesite.
      ALLOW_UPLOAD_TEST: ${ALLOW_UPLOAD_TEST:-false}
      # Cloudflare Stream
      CLOUDFLARE_ACCOUNT_ID:              ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN:               ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_STREAM_WEBHOOK_SECRET:   ${CLOUDFLARE_STREAM_WEBHOOK_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cgr-network


  # ── Queue worker (procesa videos y otros jobs) ────────────────────────────
  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cgr-queue-worker
    command: ['php', 'artisan', 'queue:work', 'redis', '--sleep=3', '--tries=2', '--timeout=300', '--max-time=3600']
    volumes:
      - ./backend:/var/www/html
      - cgr-vendor:/var/www/html/vendor
      - ./data/storage:/var/www/html/storage
      - ./docker/php/php.prod.ini:/usr/local/etc/php/conf.d/app.ini:ro
    environment:
      APP_ENV:    production
      APP_DEBUG:  "false"
      APP_URL:    https://congreso2026.bucaramanga.upb.edu.co
      APP_KEY:          DB_CONNECTION: mysql
      DB_HOST:    mysql
      DB_PORT:    "3306"
      DB_DATABASE: congreso_db
      DB_USERNAME: congreso
      DB_PASSWORD:       REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      CACHE_DRIVER:     redis
      SESSION_DRIVER:   redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL:      stderr
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cgr-network

  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cgr-mysql
    # Puerto NO expuesto al host en producción (solo accesible internamente)
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-congreso_db}
      MYSQL_USER:          ${DB_USERNAME:-congreso}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      # Bind mount → mysqldump / rsync funciona directo sobre ./data/mysql
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cgr-network

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cgr-redis
    # Puerto NO expuesto al host en producción
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cgr-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # Solo vendor queda como named volume (se rellena durante el build)
  # mysql, redis y storage usan bind mounts en ./data/ → respaldar con rsync
  cgr-vendor:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  cgr-network:
    driver: bridge
